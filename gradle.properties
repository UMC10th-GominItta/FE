# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.parallel=true

# Android
android.useAndroidX=true

# Kotlin
kotlin.code.style=official

# R-class mode — keep as false so that library R-stub classes (e.g.
# androidx.customview.poolingcontainer.R$id) are emitted into the final DEX.
# AGP 9.x with nonTransitiveRClass=true rewrites bytecode references but does
# not guarantee the stub classes are present; false restores the legacy
# transitive R-stub behaviour that keeps those classes in the DEX.
android.nonTransitiveRClass=false

# KSP compatibility with AGP 9.x built-in Kotlin mode
android.disallowKotlinSourceSets=false
